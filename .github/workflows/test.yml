# cspell:words solcoverjs

name: test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install project
      run: yarn install

    - name: Spell check
      run: yarn cspell

    - name: Compile
      run: yarn compile

    - name: Lint
      run: yarn fullCheck

    - name: Check documentation is up to date
      run: |
        yarn docgen
        if [ -n "$(git status --porcelain docs/)" ]; then
          echo "❌ Documentation is out of date!"
          echo "Please run 'yarn docgen' locally and commit the changes."
          echo ""
          echo "Changed files:"
          git status --short docs/
          exit 1
        else
          echo "✅ Documentation is up to date!"
        fi

    - name: Slither
      uses: crytic/slither-action@v0.4.1
      with:
        ignore-compile: true
        slither-args: "--compile-force-framework hardhat"
        node-version: ${{ matrix.node-version }}

    - name: Test deployment
      env:
        INFURA_API_TOKEN: ${{ secrets.INFURA_API_TOKEN }}
      run: ./scripts/test_deploy.sh

    - name: Test ABI generation
      run: yarn hardhat run scripts/generateAbi.ts

    - name: Run tests
      run: yarn hardhat coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
